<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Livrô</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/buttons.css" />
    <link rel="stylesheet" href="css/toasts.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/forms.css" />
    <link rel="stylesheet" href="css/profile.css" />
    <link rel="stylesheet" href="css/books.css?v=20260626-5" />
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="app-content">
        <header class="top-bar">
          <div class="top-bar-left"></div>
          <div class="top-bar-right" id="topBarRight"></div>
        </header>
        <div id="mensagem" class="toast-container"></div>
        <div class="page-content-wrapper">
          <h2 class="section-title">Configurações</h2>
          <form class="form-card" id="formConfiguracoes">
            <div class="user-profile-header">
              <div id="fotoConfiguracoes" class="avatar-placeholder-large"><i class="fa-solid fa-user"></i></div>
              <div class="user-profile-info">
                <h2 id="usuarioConfiguracoes">Perfil</h2>
                <p>Foto e dados da conta</p>
              </div>
            </div>
            <label>Usuário<input name="username" id="username" required /></label>
            <div class="form-row">
              <label>Nome<input name="first_name" id="first_name" /></label
              ><label>Sobrenome<input name="last_name" id="last_name" /></label>
            </div>
            <label>Email<input name="email" id="email" type="email" /></label>
            <div class="form-row">
              <label>Estado<select name="estado" id="estado"></select></label
              ><label>Cidade<select name="cidade" id="cidade"></select></label>
            </div>
            <label>Foto de perfil<input id="fotoPerfil" name="foto_perfil" type="file" accept="image/*" /></label>
            <div class="form-actions-stack">
              <button class="btn-primary-full" type="submit">Salvar configurações</button>
              <button class="btn-secondary" id="botaoRedefinirSenha" type="button">Redefinir senha por e-mail</button>
            </div>
          </form>
        </div>
      </main>
    </div>
    <script src="javascript/comum.js?v=20260626-2"></script>
    <script src="javascript/configuracoes.js?v=20260626-3"></script>
  </body>
</html>
