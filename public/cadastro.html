<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Livrô</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" referrerpolicy="no-referrer">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/buttons.css">
  <link rel="stylesheet" href="css/toasts.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/profile.css">
  <link rel="stylesheet" href="css/books.css?v=20260626-5">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-only-layout">
  <main class="app-content">
    <div id="mensagem" class="toast-container"></div>
    <div class="auth-shell">
  <div class="auth-copy"><p class="auth-kicker">Livros, trocas e gente perto de você</p><h1>Crie sua conta</h1><p>Acesse o catálogo, cadastre livros e gerencie seus interesses de troca.</p></div>
  <form class="auth-card" id="formCadastro">
    <label>Usuário<input name="username" required autocomplete="username"></label>
    <div class="form-row"><label>Nome<input name="first_name"></label><label>Sobrenome<input name="last_name"></label></div>
    <label>Email<input name="email" type="email"></label>
    <div class="form-row"><label>Estado<select name="estado" id="estado" required></select></label><label>Cidade<select name="cidade" id="cidade" required></select></label></div>
    <label>Senha<input name="password1" type="password" required></label>
    <label>Confirmar senha<input name="password2" type="password" required></label>
    <button class="btn-primary-full" type="submit">Cadastrar</button>
    <div class="auth-links"><a class="btn-as-link" href="index.html">Já tenho conta</a></div>
  </form>
</div>
  </main>
  <script src="javascript/comum.js?v=20260626-1"></script>
  <script src="javascript/cadastro.js?v=20260626-1"></script>
</body>
</html>
