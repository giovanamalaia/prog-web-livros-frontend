<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Livrô</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/buttons.css" />
    <link rel="stylesheet" href="css/toasts.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/forms.css" />
    <link rel="stylesheet" href="css/profile.css" />
    <link rel="stylesheet" href="css/books.css?v=20260626-5" />
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body class="auth-only-layout">
    <main class="app-content">
      <div id="mensagem" class="toast-container"></div>
      <div class="auth-shell">
        <div class="auth-copy">
          <p class="auth-kicker">Livros, trocas e gente perto de você</p>
          <h1>Entre no Livrô</h1>
          <p>Acesse o catálogo, cadastre livros e gerencie seus interesses de troca.</p>
        </div>
        <form class="auth-card" id="formLogin">
          <label>Usuário<input name="username" required autocomplete="username" /></label>
          <label>Senha<input name="password" type="password" required autocomplete="current-password" /></label>
          <button class="btn-primary-full" type="submit">Entrar</button>
          <div class="auth-links">
            <a class="btn-as-link" href="cadastro.html">Criar conta</a>
            <a class="btn-as-link" href="recuperar_senha.html">Esqueci minha senha</a>
          </div>
        </form>
      </div>
    </main>
    <script src="javascript/comum.js?v=20260626-2"></script>
    <script src="javascript/login.js?v=20260626-2"></script>
  </body>
</html>
