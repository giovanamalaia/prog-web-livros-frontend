<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Livrô</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/buttons.css" />
    <link rel="stylesheet" href="css/toasts.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/forms.css" />
    <link rel="stylesheet" href="css/profile.css" />
    <link rel="stylesheet" href="css/books.css?v=20260626-5" />
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="app-content">
        <header class="top-bar">
          <div class="top-bar-left"></div>
          <div class="top-bar-right" id="topBarRight"></div>
        </header>
        <div id="mensagem" class="toast-container"></div>
        <div class="page-content-wrapper">
          <h2 class="section-title" id="tituloFormularioLivro">Adicionar livro</h2>
          <div class="add-book-wrapper">
            <form class="form-card add-book-form-side" id="formLivro">
              <input type="hidden" name="id" id="livroId" /><label
                >Título<input name="titulo" id="titulo" required /></label
              ><label>Autor<input name="autor" id="autor" required /></label>
              <div class="form-row">
                <label>Gênero<select name="genero" id="genero"></select></label
                ><label
                  >Estado do livro<select name="estado" id="estadoLivro">
                    <option value="N">Novo</option>
                    <option value="SN">Semi-novo</option>
                    <option value="U">Usado</option>
                  </select></label
                >
              </div>
              <label id="campoStatus" hidden
                >Status<select name="status" id="status">
                  <option value="disponivel">Disponível</option>
                  <option value="reservado">Reservado</option>
                  <option value="trocado">Trocado</option>
                </select></label
              ><label>Capa<input name="capa" type="file" accept="image/*" /></label
              ><button class="btn-primary-full" type="submit">Cadastrar livro</button>
            </form>
          </div>
        </div>
      </main>
    </div>
    <script src="javascript/comum.js?v=20260626-1"></script>
    <script src="javascript/adicionar_livro.js?v=20260626-1"></script>
  </body>
</html>
