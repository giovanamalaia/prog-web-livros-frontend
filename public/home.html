<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Livrô</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" referrerpolicy="no-referrer">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/buttons.css">
  <link rel="stylesheet" href="css/toasts.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/profile.css">
  <link rel="stylesheet" href="css/books.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="app-content">
      <header class="top-bar">
        <form class="search-box" id="formBusca">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" name="q" id="q" placeholder="Pesquisar livro, nome, autor...">
    </form>
        <div class="top-bar-right">
          <button class="user-info-mini" id="linkPerfil" type="button">
            <span id="topAvatar" class="avatar-placeholder-mini"><i class="fa-solid fa-user"></i></span>
            <span id="topUsername">Perfil</span>
          </button>
          <div class="notif-wrapper">
            <button class="notif-btn" id="botaoNotificacoes" type="button">
              <i class="fa-regular fa-bell bell-icon"></i>
              <span class="notif-badge" id="notifBadge" hidden>0</span>
            </button>
            <div class="notif-dropdown" id="notifDropdown" hidden>
              <h4>Notificações</h4>
              <div class="notif-items-container" id="notificacoesLista"></div>
            </div>
          </div>
          <button class="btn-as-link" id="botaoSair" type="button">Sair</button>
        </div>
      </header>
      <div id="mensagem" class="toast-container"></div>
      <div class="page-content-wrapper" id="conteudoHome"><p class="empty-msg">Carregando...</p></div>
    </main>
  </div>
  <script src="javascript/comum.js?v=20260626-1"></script>
  <script src="javascript/home.js?v=20260626-1"></script>
</body>
</html>
