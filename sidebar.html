{% load i18n %}
<aside class="sidebar">
    <div class="sidebar-inner">
        <div class="sidebar-brand" aria-label="{% trans 'Ícone do site' %}">
            <i class="fa-solid fa-book"></i>
        </div>

        <div class="sidebar-sep" aria-hidden="true"></div>

        {# Mostra os elementos da sidebar #}
        <nav class="sidebar-nav" aria-label="{% trans 'Navegação lateral' %}">
            {# Link para a página inicial #}
            <a class="sidebar-link {% if active_page == 'home' %}is-active{% endif %}" href="{% url 'home' %}" aria-label="{% trans 'Início' %}"> 
                <i class="fa-solid fa-house sidebar-icon" aria-hidden="true"></i>
            </a> 

            {# Link para favoritos #}
            <a class="sidebar-link {% if active_page == 'favoritos' %}is-active{% endif %}" href="{% url 'favoritos' %}" aria-label="{% trans 'Favoritos' %}"> 
                <i class="fa-solid fa-heart sidebar-icon" aria-hidden="true"></i>
            </a> 

            {# Link para perfil #}
            <a class="sidebar-link {% if active_page == 'perfil' %}is-active{% endif %}" href="{% url 'perfil' %}" aria-label="{% trans 'Perfil' %}"> 
                <i class="fa-solid fa-user sidebar-icon" aria-hidden="true"></i>
            </a> 

            {# Link para adicionar livro #}
            <a class="sidebar-link {% if active_page == 'adicionar_livro' %}is-active{% endif %}" href="{% url 'adicionar_livro' %}" aria-label="{% trans 'Adicionar livro' %}"> 
                <i class="fa-solid fa-plus sidebar-icon" aria-hidden="true"></i>
            </a> 

            {# Link para configurações #}
            <a class="sidebar-link {% if active_page == 'configuracoes' %}is-active{% endif %}" href="{% url 'configuracoes' %}" aria-label="{% trans 'Configurações' %}"> 
                <i class="fa-solid fa-gear sidebar-icon" aria-hidden="true"></i>
            </a> 
        </nav> 
    </div> 
</aside>
